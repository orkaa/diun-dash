name: Run Tests
description: Install dependencies and run the test suite

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        version: "0.8.17"

    - name: Set up Python
      run: uv python install 3.13
      shell: bash

    - name: Install dependencies
      run: uv sync
      shell: bash

    - name: Run tests
      run: ./scripts/test.sh
      shell: bash
      env:
        DIUN_WEBHOOK_TOKEN: test
